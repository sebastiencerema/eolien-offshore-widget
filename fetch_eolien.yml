# .gitlab-ci.yml
# Remplace le fetch_eolien.yml GitHub Actions
#
# SETUP :
# 1. Settings → CI/CD → Variables → ajouter :
#      RTE_CLIENT_ID      (Masked, Protected)
#      RTE_CLIENT_SECRET  (Masked, Protected)
#      PUSH_TOKEN         (Personal Access Token avec scope "write_repository")
#
# 2. Settings → CI/CD → Schedules → New schedule :
#      Cron : 0 * * * *   (toutes les heures)
#      Target branch : main

stages:
  - fetch

fetch_eolien:
  stage: fetch
  image: python:3.11-slim

  variables:
    GIT_STRATEGY: clone

  script:
    # Dépendances
    - pip install --quiet requests

    # Récupération des données RTE
    - python fetch_eolien_rte.py

    # Commit et push du JSON mis à jour
    - git config user.email "ci-bot@gitlab"
    - git config user.name  "GitLab CI"
    - git remote set-url origin "https://oauth2:${PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git add data_eolien.json
    - git diff --cached --quiet && echo "[skip] Aucun changement" || (
        git commit -m "data: mise à jour éolien offshore $(date -u +%Y-%m-%dT%H:%M)Z" &&
        git push origin HEAD:main
      )

  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'   # cron horaire
    - if: '$CI_PIPELINE_SOURCE == "web"'         # déclenchement manuel
